services:
  # ────────────────────────────────────────────
  # WordPress — web server
  # ────────────────────────────────────────────
  wp:
    image: wordpress:latest
    ports:
      - ${IP}:${PORT}:80
    volumes:
      - ./config/wp_php.ini:/usr/local/etc/php/conf.d/conf.ini
      - ./wp-app:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: "${DB_NAME}"
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${DB_ROOT_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────
  # WP-CLI — KHÔNG chạy nền. Dùng on-demand:
  #   docker compose run --rm wpcli <lệnh>
  # ────────────────────────────────────────────
  wpcli:
    image: wordpress:cli
    profiles:
      - cli          # ← chỉ chạy khi gọi docker compose run
    volumes:
      - ./config/wp_php.ini:/usr/local/etc/php/conf.d/conf.ini
      - ./wp-app:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: "${DB_NAME}"
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${DB_ROOT_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy

  # ────────────────────────────────────────────
  # phpMyAdmin
  # ────────────────────────────────────────────
  pma:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      UPLOAD_LIMIT: 50M
    ports:
      - ${IP}:8080:80
    volumes:
      - ./config/pma_php.ini:/usr/local/etc/php/conf.d/conf.ini
      - ./config/pma_config.php:/etc/phpmyadmin/config.user.inc.php
    depends_on:
      db:
        condition: service_healthy

  # ────────────────────────────────────────────
  # MySQL
  # ────────────────────────────────────────────
  db:
    image: mysql:latest
    ports:
      - ${IP}:3307:3306
    command:
      [
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci',
      ]
    volumes:
      - ./wp-data:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:

